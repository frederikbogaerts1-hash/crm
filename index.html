  <!-- Veiligheidsnet: toon foutmelding als een library niet geladen is -->
  <script>
    (function () {
      var ontbrekend = [];
      if (typeof React === "undefined")    ontbrekend.push("React");
      if (typeof ReactDOM === "undefined") ontbrekend.push("ReactDOM");
      if (typeof Babel === "undefined")    ontbrekend.push("Babel");
      if (typeof XLSX === "undefined")     ontbrekend.push("XLSX");
      if (typeof FK_DATA === "undefined")  ontbrekend.push("FK_DATA (data.js)");
      if (ontbrekend.length) {
        var el = document.getElementById("loading");
        if (el) el.innerHTML =
          '<div class="loading-inner">' +
          '<div class="loading-wordmark">Franssen Keukens</div>' +
          '<div class="loading-sub" style="color:#b00;font-size:14px;margin-top:12px">App kon niet starten.<br>Ontbrekend: ' +
          ontbrekend.join(", ") +
          '.<br>Controleer of de map <strong>vendor/</strong> aanwezig is naast index.html.</div>' +
          '</div>';
      }
    })();
  </script>
  <!-- App (inline om file://-protocol te ondersteunen) -->
  <script type="text/babel">
/* ============================================================
   FRANSSEN KEUKENS — CRM v3.1 (STEP 2: Dossier 4-tab UI)
   React 18 + Babel standalone · Geen build-stap
   Data via window.FK_DATA (data.js)
   ============================================================ */

const { useState, useEffect, useRef, useMemo, useCallback } = React;
const UI_VERSION = "2.0";

const computeNaam = (v) => {
  const p1 = [(v.voornaam1||"").trim(), (v.familienaam1||"").trim()].filter(Boolean).join(" ");
  const p2 = (v.voornaam2||"").trim() || (v.familienaam2||"").trim()
    ? [(v.voornaam2||"").trim(), (v.familienaam2||"").trim()].filter(Boolean).join(" ")
    : "";
  return p2 ? `${p1} & ${p2}` : p1;
};
const computeAdres = (v) => {
  const straatNr = [(v.straat||"").trim(), (v.huisnummer||"").trim()].filter(Boolean).join(" ");
  const pcStad   = [(v.postcode||"").trim(), (v.stad||"").trim()].filter(Boolean).join(" ");
  return [straatNr, pcStad].filter(Boolean).join(", ");
};

    <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>

const IcoSearch = () => (

const IcoList = () => (

function Toast({ toast, onDismiss }) {
  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(onDismiss, 2500);
    return () => clearTimeout(t);
  }, [toast]);
  if (!toast) return null;
  return <div className={`toast toast-${toast.type}`} onClick={onDismiss}>{toast.bericht}</div>;
}

function ConfirmDialog({ confirm, onAnnuleer }) {
  if (!confirm) return null;
  return (
    <div className="modal-backdrop" onClick={onAnnuleer}>
      <div className="confirm-dialog" onClick={e => e.stopPropagation()}>
        <h3 className="confirm-titel">{confirm.titel}</h3>
        <p className="confirm-bericht">{confirm.bericht}</p>
        <div className="confirm-knoppen">
          <button className="btn btn-secondary" onClick={onAnnuleer}>Annuleren</button>
          <button className="btn btn-gevaar" onClick={confirm.onBevestig}>{confirm.bevestigLabel || "Bevestigen"}</button>
        </div>
      </div>
    </div>
  );
}

function StatusBadge({ status }) {
  const slug = (status || "")
    .toLowerCase()
    .replace(/[àáâãä]/g,"a").replace(/[èéêë]/g,"e")
    .replace(/[ìíîï]/g,"i").replace(/[òóôõö]/g,"o").replace(/[ùúûü]/g,"u")
    .replace(/[^a-z0-9]/g,"-").replace(/-+/g,"-").replace(/^-|-$/g,"");
  return <span className={`status-badge status-${slug}`}>{status}</span>;
}

function LoginScreen({ onLogin }) {
  const [ww, setWw]     = useState("");
  const [fout, setFout] = useState("");
  const submit = (e) => {
    e.preventDefault();
    if (FK_DATA.checkPassword(ww)) { FK_DATA.setAuthenticated(); onLogin(); }
    else { setFout("Fout wachtwoord. Probeer het opnieuw."); setWw(""); }
  };
  return (
    <div className="login-scherm">
      <div className="login-kaart">
        <div className="login-logo">
          <span className="login-logo-franssen">Franssen</span>
          <span className="login-logo-keukens"> Keukens</span>
        </div>
        <p className="login-subtitel">Verkoopadministratie</p>
        <form onSubmit={submit}>
          <div className="veld-groep">
            <label className="veld-label" htmlFor="wachtwoord">Wachtwoord</label>
            <input id="wachtwoord" type="password" className="fk-input" value={ww}
              onChange={e => { setWw(e.target.value); setFout(""); }}
              placeholder="Voer het wachtwoord in" autoFocus />
            {fout && <p className="veld-fout">{fout}</p>}
          </div>
          <button type="submit" className="btn btn-primary btn-volledig">Aanmelden</button>
        </form>
      </div>
    </div>
  );
}

function GlobalSearch({ onSluit, onOpenDossier }) {
  const [query, setQuery]           = useState("");
  const [resultaten, setResultaten] = useState([]);
  const inputRef = useRef(null);
  useEffect(() => {
    inputRef.current && inputRef.current.focus();
    const onKey = (e) => { if (e.key === "Escape") onSluit(); };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, []);
  useEffect(() => {
    if (query.trim().length >= 2) setResultaten(FK_DATA.search(query));
    else setResultaten([]);
  }, [query]);
  return (
    <div className="search-overlay" onClick={onSluit}>
      <div className="search-container" onClick={e => e.stopPropagation()}>
        <div className="search-invoer-wrapper">
          <IcoSearch />
          <input ref={inputRef} className="search-input-groot" type="text" value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="Zoek op naam, telefoon, e-mail, adres of dossier-ID…" />
          <button className="btn-icoon-rond" onClick={onSluit} title="Sluiten"><IcoX /></button>
        </div>
        {query.trim().length >= 2 && (
          <div className="search-resultaten">
            {resultaten.length === 0
              ? <div className="search-geen-resultaat">Geen dossiers gevonden voor "{query}".</div>
              : resultaten.map(r => (
                  <div key={r.id} className="search-resultaat-item"
                    onClick={() => { onOpenDossier(r.id); onSluit(); }}>
                    <div className="search-resultaat-naam">{r.naam}</div>
                    <div className="search-resultaat-meta">
                      <StatusBadge status={r.status} />
                      {r.adviseur && <span>{r.adviseur}</span>}
                      {r.telefoon && <span>{r.telefoon}</span>}
                      {r.adres    && <span>{r.adres}</span>}
                    </div>
                  </div>
                ))
            }
          </div>
        )}
        {query.trim().length < 2 && (
          <div className="search-hint">Typ minimaal 2 tekens om te zoeken · Druk Escape om te sluiten</div>
        )}
      </div>
    </div>
  );
}

function Nav({ tab, onTabChange, onNieuw, onExport, onImport, onLogout, onSearch }) {
  const fileRef = useRef(null);
  return (
    <nav className="nav">
      <div className="nav-merk">
        <span className="nav-franssen">Franssen</span>
        <span className="nav-keukens"> Keukens</span>
        <span className="nav-crm">CRM</span>
      </div>
      <div className="nav-tabs">
        <button className={`nav-tab ${tab==="kanban"  ? "nav-tab-actief":""}`} onClick={() => onTabChange("kanban")}>Pipeline</button>
        <button className={`nav-tab ${tab==="vandaag" ? "nav-tab-actief":""}`} onClick={() => onTabChange("vandaag")}>Vandaag</button>
        <button className={`nav-tab ${tab==="analyse" ? "nav-tab-actief":""}`} onClick={() => onTabChange("analyse")}>Analyse</button>
      </div>
      <div className="nav-acties">
        <button className="btn btn-secondary btn-sm btn-icoon" onClick={onSearch} title="Zoeken (Ctrl+K)"><IcoSearch /></button>
        <button className="btn btn-primary btn-sm" onClick={onNieuw}><IcoPlusCircle /> Nieuw dossier</button>
        <button className="btn btn-secondary btn-sm btn-icoon" onClick={onExport} title="Excel exporteren"><IcoDownload /></button>
        <button className="btn btn-secondary btn-sm btn-icoon"
          onClick={() => fileRef.current && fileRef.current.click()} title="Excel importeren"><IcoUpload /></button>
        <input ref={fileRef} type="file" accept=".xlsx" style={{display:"none"}} onChange={onImport} />
        <button className="btn btn-ghost btn-sm btn-icoon" onClick={onLogout} title="Afmelden"><IcoLogout /></button>
      </div>

}

function KlantKaart({ record, onKlik, onDragStart }) {
  const overtijdStatus = FK_DATA.isOvertijd(record.volgende_actie);
  const openTaken = (record.taken||[]).filter(t=>!t.afgerond).length;
  return (
    <div className={`klant-kaart ${overtijdStatus==="overtijd"?"kaart-overtijd":""}`}
      draggable onDragStart={e=>{e.dataTransfer.effectAllowed="move";onDragStart(record.id);}} onClick={onKlik}>
      <div className="kaart-header">
        <div className="kaart-naam">{record.naam}</div>
        {openTaken > 0 && <span className="kaart-taken-badge" title={`${openTaken} open taak${openTaken>1?"en":""}`}>{openTaken}</span>}
      </div>
      <div className="kaart-meta">
        {record.adviseur && <span className="kaart-adviseur">{record.adviseur.split(" ")[0]}</span>}
        {record.showroom  && <span className="kaart-bron">{record.showroom}</span>}
        {!record.adviseur && record.bron && <span className="kaart-bron">{record.bron}</span>}
      </div>
      {record.offerteprijs && <div className="kaart-prijs">{record.offerteprijs}</div>}
      {record.volgende_actie && (
        <div className={`kaart-datum kaart-datum-${overtijdStatus}`}>
          {overtijdStatus==="overtijd"&&"⚠ "}{overtijdStatus==="vandaag"&&"📅 "}{overtijdStatus==="toekomst"&&"⏰ "}
          {FK_DATA.fmtDatetime(record.volgende_actie)}
        </div>
      )}
    </div>
  );
}

function KanbanKolom({ status, records, onKlik, onDragStart, onDrop }) {
  const [dragOver, setDragOver] = useState(false);
  const kolomKlasse = useMemo(() => {
    if (["Besteld","Geïnstalleerd","Service"].includes(status)) return "kolom-besteld";
    if (status==="Verloren") return "kolom-verloren";
    return "";
  }, [status]);
  return (
    <div className={["kanban-kolom",kolomKlasse,dragOver?"kolom-drag-over":""].filter(Boolean).join(" ")}
      onDragOver={e=>{e.preventDefault();setDragOver(true);}}
      onDragLeave={()=>setDragOver(false)}
      onDrop={()=>{setDragOver(false);onDrop(status);}}>
      <div className="kolom-header">
        <span className="kolom-titel">{status}</span>
        <span className="kolom-teller">{records.length}</span>
      </div>
      <div className="kolom-kaarten">
        {records.map(r => <KlantKaart key={r.id} record={r} onKlik={()=>onKlik(r.id)} onDragStart={onDragStart} />)}
      </div>
    </div>
  );
}

const TAAK_TYPES = [
  { id: "offerte",  label: "Offerte-opvolging" },
  { id: "ontwerp",  label: "Ontwerp maken + keuken uitrekenen" },
  { id: "afspraak", label: "Nieuwe afspraak inplannen" },
  { id: "email",    label: "E-mail verzenden" },
  { id: "vrij",     label: "Vrije ingave" },
];

function TakenSectie({ record, onRefresh, onToast }) {
  const [nieuwType,     setNieuwType]     = useState("offerte");
  const [vrijeTekst,    setVrijeTekst]    = useState("");
  const [nieuweDatum,   setNieuweDatum]   = useState("");
  const [tonenAfgerond, setTonenAfgerond] = useState(false);
  const taken    = record.taken||[];
  const open     = taken.filter(t=>!t.afgerond);
  const afgerond = taken.filter(t=> t.afgerond);
  const voegToe = () => {
    const typeObj = TAAK_TYPES.find(t => t.id === nieuwType);
    const titel = nieuwType === "vrij" ? vrijeTekst.trim() : typeObj.label;
    if (!titel) return;
    const r = FK_DATA.addTask(record.id, { titel, type: nieuwType, vervaldatum: nieuweDatum });
    if (!r.ok) { onToast({ type: "fout", bericht: r.error }); return; }
    setVrijeTekst(""); setNieuweDatum(""); onRefresh();
  };
  const toggleAfgerond = (id,huidig) => {
    const r = FK_DATA.updateTask(record.id,id,{afgerond:!huidig});
    if (!r.ok) onToast({type:"fout",bericht:r.error}); else onRefresh();
  };
  const verwijder = (id) => {
    const r = FK_DATA.deleteTask(record.id,id);
    if (!r.ok) onToast({type:"fout",bericht:r.error}); else onRefresh();
  };
  const isLaat = (v) => { if(!v) return false; const d=new Date(v);d.setHours(0,0,0,0); const n=new Date();n.setHours(0,0,0,0); return d<n; };
  return (
    <div className="taken-sectie">
      <div className="taken-header">
        <h3 className="sidebar-sectie-titel">Taken</h3>
        {open.length > 0 && <span className="taken-badge-open">{open.length} open</span>}
      </div>
      <div className="taak-invoer-rij">
        <select className="fk-input fk-select" value={nieuwType} onChange={e => setNieuwType(e.target.value)}>
          {TAAK_TYPES.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
        </select>
        <input className="fk-input fk-input-smal" type="date" value={nieuweDatum}
          onChange={e=>setNieuweDatum(e.target.value)} title="Vervaldatum" />
        <button className="btn btn-primary btn-sm" onClick={voegToe}
          disabled={nieuwType === "vrij" && !vrijeTekst.trim()}>+</button>
      </div>
      {nieuwType === "vrij" && (
        <div style={{ marginBottom: "8px" }}>
          <input className="fk-input" type="text" value={vrijeTekst}
            onChange={e => setVrijeTekst(e.target.value)} placeholder="Beschrijf de taak…"
            onKeyDown={e => { if (e.key === "Enter") voegToe(); }} />
        </div>
      )}
      {open.length===0&&afgerond.length===0&&<p className="logboek-leeg">Geen taken. Voeg er één toe hierboven.</p>}
      {open.map(t => (
        <div key={t.id} className="taak-item">
          <button className="taak-checkbox" onClick={()=>toggleAfgerond(t.id,t.afgerond)} title="Markeer als afgerond" />
          <div className="taak-info">
            <span className="taak-titel">{t.titel}</span>
            {t.vervaldatum && <span className={`taak-datum ${isLaat(t.vervaldatum)?"taak-datum-laat":""}`}>{FK_DATA.fmtDate(t.vervaldatum)}</span>}
          </div>
          <button className="taak-verwijder btn-icoon-rond" onClick={()=>verwijder(t.id)} title="Verwijder"><IcoX /></button>
        </div>
      ))}
      {afgerond.length > 0 && (
        <div className="taken-afgerond-sectie">
          <button className="taken-toon-afgerond" onClick={()=>setTonenAfgerond(v=>!v)}>
            {tonenAfgerond?"▲ Verberg":"▼ Toon"} afgeronde taken ({afgerond.length})
          </button>
          {tonenAfgerond && afgerond.map(t => (
            <div key={t.id} className="taak-item taak-item-afgerond">
              <button className="taak-checkbox taak-checkbox-aan" onClick={()=>toggleAfgerond(t.id,t.afgerond)}><IcoCheck /></button>
              <div className="taak-info"><span className="taak-titel">{t.titel}</span></div>
              <button className="taak-verwijder btn-icoon-rond" onClick={()=>verwijder(t.id)}><IcoX /></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function TabOverzicht({ record, velden, wijzig, veldFouten, opgeslagen, overtijdStatus, toonOrderMaand, onSlaOp, onVerwijder }) {
  const [toonP2, setToonP2] = useState(!!(velden.voornaam2 || velden.familienaam2));
  const autoFillStad = (pc) => {
    if (pc.length >= 4 && window.FK_POSTCODES && window.FK_POSTCODES[pc]) {
      wijzig("stad", window.FK_POSTCODES[pc]);
    }
  };
  const autoFillPostcode = (stad) => {
    if (!stad.trim() || velden.postcode || !window.FK_POSTCODES) return;
    const q = stad.trim().toLowerCase();
    const hit = Object.entries(window.FK_POSTCODES).find(([,v]) => v.toLowerCase() === q);
    if (hit) wijzig("postcode", hit[0]);
  };
  return (
    <div className="tab-overzicht">
      <div className="veld-rij">
        <div className="veld-groep">
          <label className="veld-label" htmlFor="s-vn1">Voornaam</label>
          <input id="s-vn1" className="fk-input"
            value={velden.voornaam1} onChange={e=>wijzig("voornaam1",e.target.value)} placeholder="Voornaam" />
        </div>
        <div className="veld-groep">
          <label className="veld-label" htmlFor="s-fn1">Familienaam *</label>
          <input id="s-fn1" className={`fk-input ${veldFouten.familienaam1?"fk-input-fout":""}`}
            value={velden.familienaam1} onChange={e=>wijzig("familienaam1",e.target.value)} placeholder="Familienaam" />
          {veldFouten.familienaam1 && <p className="veld-fout">{veldFouten.familienaam1}</p>}
        </div>
      </div>
      {!toonP2
        ? <button type="button" className="btn btn-ghost btn-sm" style={{marginBottom:"8px"}} onClick={()=>setToonP2(true)}>+ Tweede persoon</button>
        : (
          <div className="veld-rij">
            <div className="veld-groep">

function bestandIcoon(type) {
  if (!type) return "📎";
  if (type === "application/pdf") return "📄";
  if (type.startsWith("image/")) return "🖼";
  if (type.includes("spreadsheet") || type.includes("excel") || type.includes("csv")) return "📊";
  if (type.includes("word") || type.includes("document")) return "📝";
  return "📎";
}

function TabBestanden({ record, onRefresh, onToast }) {
  const [dragOver,     setDragOver]     = useState(false);
  const [bezig,        setBezig]        = useState(false);
  const [confirmDel,   setConfirmDel]   = useState(null);
  const [hernoem,      setHernoem]      = useState(null);
  const [hernoemWaarde,setHernoemWaarde]= useState("");
  const fileRef = useRef(null);

  const bestanden = record.bestanden || [];

  const verwerkBestanden = async (files) => {
    if (!files || files.length === 0) return;
    setBezig(true);
    let aantalOk = 0;
    for (const file of Array.from(files)) {
      const r = await FK_DATA.addFile(record.id, file);
      if (!r.ok) { onToast({ type: "fout", bericht: r.error }); }
      else { aantalOk++; }
    }
    if (aantalOk > 0) {
      onToast({ type: "succes", bericht: aantalOk === 1 ? "Bestand toegevoegd." : `${aantalOk} bestanden toegevoegd.` });
      onRefresh();
    }
    setBezig(false);
  };

  const openBestand = async (meta) => {
    const blob = await FK_DATA.getFileBlob(meta.id);
    if (!blob) { onToast({ type: "fout", bericht: "Bestand niet gevonden. Mogelijk verwijderd of op een ander apparaat geüpload." }); return; }
    const url = URL.createObjectURL(blob);
    window.open(url, "_blank");
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  };

  const downloadBestand = async (meta) => {
    const blob = await FK_DATA.getFileBlob(meta.id);
    if (!blob) { onToast({ type: "fout", bericht: "Bestand niet gevonden." }); return; }
    const url = URL.createObjectURL(blob);
    const a   = document.createElement("a");
    a.href = url; a.download = meta.naam; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  };

  const startHernoem = (meta) => { setHernoem(meta.id); setHernoemWaarde(meta.naam); };
  const slaHernoemOp = (fileId) => {
    if (!hernoemWaarde.trim()) return;
    const r = FK_DATA.renameFile(record.id, fileId, hernoemWaarde.trim());
    if (!r.ok) onToast({ type: "fout", bericht: r.error });
    else { onToast({ type: "succes", bericht: "Naam gewijzigd." }); onRefresh(); }
    setHernoem(null);
  };

  const verwijderBestand = (meta) => {
    setConfirmDel({
      titel: "Bestand verwijderen?",
      bericht: `"${meta.naam}" wordt permanent verwijderd uit dit dossier.`,
      bevestigLabel: "Ja, verwijderen",
      onBevestig: async () => {
        const r = await FK_DATA.deleteFile(record.id, meta.id);
        if (!r.ok) onToast({ type: "fout", bericht: r.error });
        else { onToast({ type: "succes", bericht: "Bestand verwijderd." }); onRefresh(); }
        setConfirmDel(null);
      }
    });
  };

  return (
    <div className="tab-bestanden">
      <div
        className={`dropzone ${dragOver ? "dropzone-actief" : ""} ${bezig ? "dropzone-bezig" : ""}`}
        onDragOver={e => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={e => { e.preventDefault(); setDragOver(false); verwerkBestanden(e.dataTransfer.files); }}
        onClick={() => !bezig && fileRef.current && fileRef.current.click()}
      >
        <div className="dropzone-icoon">{bezig ? "⏳" : "📁"}</div>
        <p className="dropzone-tekst">{bezig ? "Bezig met uploaden…" : "Sleep bestanden hierheen of klik om te kiezen"}</p>
        <p className="dropzone-sub">PDF-plannen, stuklijsten, afbeeldingen — max 25 MB per bestand</p>
        <input ref={fileRef} type="file" multiple style={{ display: "none" }}
          onChange={e => { verwerkBestanden(e.target.files); e.target.value = ""; }} />
      </div>

      {bestanden.length > 0 && (
        <div className="bestanden-lijst">
          {[...bestanden].reverse().map(meta => (
            <div key={meta.id} className="bestand-rij">
              <div className="bestand-icoon">{bestandIcoon(meta.type)}</div>
              <div className="bestand-info">
                {hernoem === meta.id ? (
                  <div className="hernoem-invoer-rij">
                    <input className="fk-input fk-input-sm" value={hernoemWaarde}
                      autoFocus
                      onChange={e => setHernoemWaarde(e.target.value)}
                      onKeyDown={e => { if (e.key === "Enter") slaHernoemOp(meta.id); if (e.key === "Escape") setHernoem(null); }} />
                    <button className="btn btn-primary btn-sm" onClick={() => slaHernoemOp(meta.id)}>Opslaan</button>
                    <button className="btn btn-secondary btn-sm" onClick={() => setHernoem(null)}>Annuleer</button>
                  </div>
                ) : (
                  <div className="bestand-naam">{meta.naam}</div>
                )}
                <div className="bestand-meta">
                  {FK_DATA.fmtBytes(meta.grootte)} · {FK_DATA.fmtDatum(meta.geupload)}
                </div>
              </div>
              <div className="bestand-acties">
                <button className="btn btn-secondary btn-sm" onClick={() => openBestand(meta)}>Open</button>
                <button className="btn btn-secondary btn-sm" onClick={() => downloadBestand(meta)}>Download</button>
                <button className="btn btn-secondary btn-sm" onClick={() => startHernoem(meta)}>Hernoemen</button>
                <button className="btn btn-gevaar-outline btn-sm" onClick={() => verwijderBestand(meta)}>Verwijder</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {bestanden.length === 0 && !bezig && (
        <p className="logboek-leeg">Nog geen bestanden in dit dossier.</p>
      )}

      {(record.offerteprijs || record.materialen) && (
        <div className="offerte-samenvatting">
          {record.offerteprijs && (<><div className="veld-label">Offerteprijs (huidig)</div><div className="offerte-prijs-groot">{record.offerteprijs}</div></>)}
          {record.budget     && <div className="offerte-budget">Budget: {record.budget}</div>}
          {record.materialen && <div className="offerte-materialen">{record.materialen}</div>}
        </div>
      )}

      {confirmDel && <ConfirmDialog confirm={confirmDel} onAnnuleer={() => setConfirmDel(null)} />}
    </div>
  );
}

function DetailSidebar({ recordId, records, onSluit, onRefresh, onToast, onVerwijder }) {
  const record = records.find(r => r.id === recordId);
  const [activeTab,     setActiveTab]     = useState("overzicht");
  const [velden,        setVelden]        = useState({});
  const [opgeslagen,    setOpgeslagen]    = useState(false);

  useEffect(() => {
    if (record) {
      setVelden({
        voornaam1:    record.voornaam1    || "",
        familienaam1: record.familienaam1 || (record.naam || ""),
        voornaam2:    record.voornaam2    || "",
        familienaam2: record.familienaam2 || "",
        straat:       record.straat       || "",
        huisnummer:   record.huisnummer   || "",
        postcode:     record.postcode     || "",
        stad:         record.stad         || "",
        naam:record.naam||"", telefoon:record.telefoon||"", email:record.email||"",
        adres:record.adres||"", adviseur:record.adviseur||"", showroom:record.showroom||"",
        bron:record.bron||"Web", offerteprijs:record.offerteprijs||"", budget:record.budget||"",
        materialen:record.materialen||"", volgende_actie:record.volgende_actie||"",
        orderMaand:record.orderMaand||"", status:record.status||"Lead"
      });
      setVeldFouten({}); setOpgeslagen(false);

  }, [recordId]);

  if (!record) return null;

  const wijzig = (veld,waarde) => { setVelden(v=>({...v,[veld]:waarde})); setVeldFouten(f=>({...f,[veld]:""})); };
  const slaOp = () => {
    const f = {};
    if (!velden.familienaam1.trim()) f.familienaam1 = "Familienaam is verplicht.";
    if (Object.keys(f).length > 0) { setVeldFouten(f); return; }
    const naam  = computeNaam(velden);
    const adres = computeAdres(velden);
    const r = FK_DATA.update(record.id, { ...velden, naam, adres });
    if (!r.ok) { onToast({type:"fout",bericht:r.error}); return; }
    setOpgeslagen(true); setTimeout(()=>setOpgeslagen(false),2000); onRefresh();
  };

  const overtijdStatus = FK_DATA.isOvertijd(velden.volgende_actie);
  const toonOrderMaand = ["Besteld","Geïnstalleerd","Service"].includes(velden.status);
  const TABS = [
    {id:"overzicht",label:"Overzicht"},
    {id:"bestanden",label:"Bestanden"},
    {id:"bezoeken", label:"Bezoeken"},
    {id:"taken",    label:"Taken & Notities"}

  return (
    <>
      <div className="sidebar-backdrop" onClick={onSluit} />
      <div className="sidebar open">
        <div className="sidebar-header">
          <div className="sidebar-naam">{record.naam||"Dossier"}</div>
          <div className="sidebar-header-acties">
            <StatusBadge status={record.status} />
            <button className="btn-icoon-rond" onClick={onSluit} title="Sluiten"><IcoX /></button>
          </div>
        </div>

        {showChangelog && (
          <div className="changelog-banner">
            <div className="changelog-inhoud">
              <strong>Wat is er nieuw?</strong>
              <ul className="changelog-lijst">
                <li>Dossier heeft nu 4 tabbladen</li>
                <li>Bezoeken en contactmomenten op eigen tabblad</li>
                <li>Taken en notities op eigen tabblad</li>
              </ul>
            </div>
            <button className="btn-icoon-rond" title="Sluiten" onClick={()=>{
              localStorage.setItem("fk_ui_version",UI_VERSION); setShowChangelog(false);
            }}><IcoX /></button>
          </div>
        )}

        <div className="dossier-tabs-nav">
          {TABS.map(t => (
            <button key={t.id}
              className={`dossier-tab-knop ${activeTab===t.id?"dossier-tab-knop-actief":""}`}
              onClick={()=>setActiveTab(t.id)}>
              {t.label}
            </button>
          ))}
        </div>

        <div className="dossier-tab-inhoud">
          {activeTab==="overzicht" && (
            <TabOverzicht record={record} velden={velden} wijzig={wijzig}
              veldFouten={veldFouten} opgeslagen={opgeslagen}
              overtijdStatus={overtijdStatus} toonOrderMaand={toonOrderMaand}
              onSlaOp={slaOp} onVerwijder={onVerwijder} />
          )}
          {activeTab==="bestanden" && <TabBestanden record={record} onRefresh={onRefresh} onToast={onToast} />}
          {activeTab==="bezoeken"  && <TabBezoeken  record={record} onRefresh={onRefresh} onToast={onToast} />}
          {activeTab==="taken"     && <TabTakenNotities record={record} onRefresh={onRefresh} onToast={onToast} />}
        </div>
      </div>
    </>
  );
}

function NieuwDossierModal({ onSluit, onOpslaan, onOpenBestaand, onToast }) {
  const [velden, setVelden] = useState({
    voornaam1:"", familienaam1:"", voornaam2:"", familienaam2:"",
    straat:"", huisnummer:"", postcode:"", stad:"",
    telefoon:"", email:"",
    adviseur:"", showroom:"", bron:"Web", volgende_actie:"", status:"Lead"
  });
  const [toonP2,     setToonP2]     = useState(false);
  const [fouten,     setFouten]     = useState({});
  const [duplicaten, setDuplicaten] = useState([]);

  const wijzig = (veld,waarde) => { setVelden(v=>({...v,[veld]:waarde})); setFouten(f=>({...f,[veld]:""})); };

  const checkDups = (overrides={}) => {
    const v = {...velden,...overrides};
    const adres = computeAdres(v);
    if (!v.email && !v.telefoon && !adres) { setDuplicaten([]); return; }
    setDuplicaten(FK_DATA.findDuplicates(v.email, v.telefoon, adres));
  };

  const autoFillStad = (pc) => {
    if (pc.length >= 4 && window.FK_POSTCODES && window.FK_POSTCODES[pc]) {
      wijzig("stad", window.FK_POSTCODES[pc]);
    }
  };
  const autoFillPostcodeModal = (stad) => {
    if (!stad.trim() || velden.postcode || !window.FK_POSTCODES) return;
    const q = stad.trim().toLowerCase();
    const hit = Object.entries(window.FK_POSTCODES).find(([,v]) => v.toLowerCase() === q);
    if (hit) wijzig("postcode", hit[0]);
  };

  const slaOp = () => {
    const f = {};
    if (!velden.familienaam1.trim()) f.familienaam1 = "Familienaam is verplicht.";
    if (Object.keys(f).length > 0) { setFouten(f); return; }
    const naam  = computeNaam(velden);
    const adres = computeAdres(velden);
    const r = FK_DATA.add({ ...velden, naam, adres });
    if (!r.ok) { onToast({type:"fout",bericht:r.error}); return; }
    onOpslaan(r.record.id);
  };

  return (
    <div className="modal-backdrop" onClick={onSluit}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <h2 className="modal-titel">Nieuw dossier</h2>
          <button className="btn-icoon-rond" onClick={onSluit}><IcoX /></button>
        </div>
        <div className="modal-inhoud">
          <div className="veld-rij">
            <div className="veld-groep">
              <label className="veld-label" htmlFor="n-vn1">Voornaam</label>
              <input id="n-vn1" className="fk-input" value={velden.voornaam1}
                onChange={e=>wijzig("voornaam1",e.target.value)} placeholder="Voornaam" autoFocus />
            </div>
            <div className="veld-groep">
              <label className="veld-label" htmlFor="n-fn1">Familienaam *</label>
              <input id="n-fn1" className={`fk-input ${fouten.familienaam1?"fk-input-fout":""}`}
                value={velden.familienaam1} onChange={e=>wijzig("familienaam1",e.target.value)} placeholder="Familienaam" />
              {fouten.familienaam1 && <p className="veld-fout">{fouten.familienaam1}</p>}
            </div>
          </div>
          {!toonP2
            ? <button type="button" className="btn btn-ghost btn-sm" style={{marginBottom:"8px"}} onClick={()=>setToonP2(true)}>+ Tweede persoon</button>
            : (
              <div className="veld-rij">
                <div className="veld-groep">
                  <label className="veld-label" htmlFor="n-vn2">Voornaam 2</label>
                  <input id="n-vn2" className="fk-input" value={velden.voornaam2}
                    onChange={e=>wijzig("voornaam2",e.target.value)} placeholder="Voornaam (optioneel)" />
                </div>
                <div className="veld-groep">
                  <label className="veld-label" htmlFor="n-fn2">Familienaam 2</label>
                  <input id="n-fn2" className="fk-input" value={velden.familienaam2}
                    onChange={e=>wijzig("familienaam2",e.target.value)} placeholder="Familienaam (optioneel)" />
                </div>
              </div>
            )
          }
          <div className="veld-rij">
            <div className="veld-groep">
              <label className="veld-label" htmlFor="n-tel">Telefoon</label>
              <input id="n-tel" className="fk-input" value={velden.telefoon}
                onChange={e=>wijzig("telefoon",e.target.value)}
                onBlur={e=>checkDups({telefoon:e.target.value})} placeholder="0477 00 00 00" />
            </div>
            <div className="veld-groep">
              <label className="veld-label" htmlFor="n-email">E-mail</label>
              <input id="n-email" type="email" className="fk-input" value={velden.email}
                onChange={e=>wijzig("email",e.target.value)}
                onBlur={e=>checkDups({email:e.target.value})} placeholder="naam@email.be" />
            </div>
          </div>
          <div className="veld-rij">
            <div className="veld-groep" style={{flex:2}}>
              <label className="veld-label" htmlFor="n-straat">Straat</label>
              <input id="n-straat" className="fk-input" value={velden.straat}
                onChange={e=>wijzig("straat",e.target.value)} placeholder="Straatnaam" />
            </div>
            <div className="veld-groep">
              <label className="veld-label" htmlFor="n-huisnr">Nr.</label>
              <input id="n-huisnr" className="fk-input" value={velden.huisnummer}
                onChange={e=>wijzig("huisnummer",e.target.value)} placeholder="Nr." />
            </div>
          </div>
          <div className="veld-rij">
            <div className="veld-groep">
              <label className="veld-label" htmlFor="n-postcode">Postcode</label>
              <input id="n-postcode" className="fk-input" value={velden.postcode}
                onChange={e=>{wijzig("postcode",e.target.value);autoFillStad(e.target.value);}}
                placeholder="2440" maxLength={4} />
            </div>
            <div className="veld-groep" style={{flex:2}}>
              <label className="veld-label" htmlFor="n-stad">Gemeente</label>
              <input id="n-stad" className="fk-input" value={velden.stad}
                onChange={e=>wijzig("stad",e.target.value)}
                onBlur={e=>autoFillPostcodeModal(e.target.value)} placeholder="Gemeente" />

          </div>
          {duplicaten.length > 0 && (
            <div className="duplicaat-waarschuwing">
              <strong>⚠ Mogelijk bestaand dossier gevonden:</strong>
              {duplicaten.map(d => (
                <div key={d.id} className="duplicaat-item">
                  <div className="duplicaat-item-info">
                    <span className="duplicaat-naam">{d.naam}</span>
                    <StatusBadge status={d.status} />

                  <button className="btn btn-sm btn-secondary" onClick={()=>{onOpenBestaand(d.id);onSluit();}}>Open dossier</button>
                </div>
              ))}

            </div>
          )}
          <div className="veld-rij">
            <div className="veld-groep">
              <label className="veld-label" htmlFor="n-adviseur">Adviseur</label>
              <select id="n-adviseur" className="fk-input" value={velden.adviseur} onChange={e=>wijzig("adviseur",e.target.value)}>

            <div className="veld-groep">
              <label className="veld-label" htmlFor="n-showroom">Showroom</label>
              <select id="n-showroom" className="fk-input" value={velden.showroom} onChange={e=>wijzig("showroom",e.target.value)}>
                <option value="">— kies —</option>
                {SHOWROOMS.map(s=><option key={s}>{s}</option>)}

            <div className="veld-groep">

function KanbanScreen({ records, onRefresh, onToast, sidebar, setSidebar }) {
  const [dragging,       setDragging]       = useState(null);
  const [confirm,        setConfirm]        = useState(null);
  const [filterShowroom, setFilterShowroom] = useState("");
  const [filterAdviseur, setFilterAdviseur] = useState("");
  const [filterMaand,    setFilterMaand]    = useState("");
  const [weergave,       setWeergave]       = useState("kanban");

  const gefilterd = useMemo(() => records.filter(r => {
    if (filterShowroom && r.showroom!==filterShowroom) return false;
    if (filterAdviseur && r.adviseur!==filterAdviseur) return false;
    if (filterMaand    && r.aangemaakt.slice(0,7)!==filterMaand) return false;
    return true;
  }), [records,filterShowroom,filterAdviseur,filterMaand]);

  const actieveFilters = filterShowroom||filterAdviseur||filterMaand;

  const recordsByStatus = useMemo(() => {
    const map={};
    STATUSSEN.forEach(s=>{map[s]=[];});
    gefilterd.forEach(r=>{ if(map[r.status]) map[r.status].push(r); else map["Lead"].push(r); });
    return map;
  }, [gefilterd]);

  const gesorteerdeGefilterd = useMemo(() =>
    [...gefilterd].sort((a,b)=>new Date(b.aangemaakt)-new Date(a.aangemaakt)), [gefilterd]);

  const handleDrop = (status) => {
    if (!dragging) return;
    const r=FK_DATA.update(dragging,{status});
    if (!r.ok) onToast({type:"fout",bericht:r.error}); else onRefresh();
    setDragging(null);
  };

  const handleVerwijder = (id) => {
    setConfirm({
      titel:"Dossier verwijderen?",
      bericht:"Dit dossier en alle bijhorende notities en taken worden permanent verwijderd. Dit kan niet ongedaan worden gemaakt.",
      bevestigLabel:"Ja, verwijderen",
      onBevestig:()=>{FK_DATA.delete(id);setSidebar(null);onRefresh();onToast({type:"succes",bericht:"Dossier verwijderd."});setConfirm(null);}
    });
  };

  return (
    <div className="kanban-wrapper">
      <div className="filter-bar">
        <select className="filter-select" value={filterShowroom} onChange={e=>setFilterShowroom(e.target.value)}>
          <option value="">Alle showrooms</option>
          {SHOWROOMS.map(s=><option key={s}>{s}</option>)}
        </select>
        <select className="filter-select" value={filterAdviseur} onChange={e=>setFilterAdviseur(e.target.value)}>
          <option value="">Alle adviseurs</option>
          {ADVISEURS.map(a=><option key={a}>{a}</option>)}
        </select>
        <input type="month" className="filter-select filter-maand" value={filterMaand}
          onChange={e=>setFilterMaand(e.target.value)} title="Filter op aanmaakmaand" />
        {actieveFilters && (
          <button className="btn btn-ghost btn-sm filter-wis"
            onClick={()=>{setFilterShowroom("");setFilterAdviseur("");setFilterMaand("");}}>✕ Wis filters</button>
        )}
        {actieveFilters && <span className="filter-teller">{gefilterd.length} dossier{gefilterd.length!==1?"s":""}</span>}
        <div className="filter-bar-spacer" />
        <div className="weergave-knoppen">
          <button className={`btn btn-sm btn-icoon ${weergave==="kanban"?"btn-secondary":"btn-ghost"}`}
            onClick={()=>setWeergave("kanban")} title="Kanban weergave"><IcoKanban /></button>
          <button className={`btn btn-sm btn-icoon ${weergave==="lijst"?"btn-secondary":"btn-ghost"}`}
            onClick={()=>setWeergave("lijst")} title="Lijst weergave"><IcoList /></button>
        </div>
      </div>

      {weergave==="kanban" && (
        <div className="kanban-board">
          {STATUSSEN.map(status => (
            <KanbanKolom key={status} status={status} records={recordsByStatus[status]||[]}
              onKlik={id=>setSidebar(id)} onDragStart={id=>setDragging(id)} onDrop={handleDrop} />
          ))}
        </div>
      )}

      {weergave==="lijst" && (
        <div className="lijst-weergave">
          {gesorteerdeGefilterd.length===0
            ? <div className="agenda-leeg">Geen dossiers gevonden.</div>
            : gesorteerdeGefilterd.map(r => {
                const ot=(r.taken||[]).filter(t=>!t.afgerond).length;
                return (
                  <div key={r.id} className="lijst-rij" onClick={()=>setSidebar(r.id)}>
                    <div className="lijst-naam">{r.naam}</div>
                    <StatusBadge status={r.status} />
                    <div className="lijst-meta">
                      {r.adviseur    && <span>{r.adviseur}</span>}
                      {r.showroom    && <span>{r.showroom}</span>}
                      {r.offerteprijs && <span className="lijst-prijs">{r.offerteprijs}</span>}
                    </div>
                    {ot>0 && <span className="lijst-taken-badge">{ot} taak{ot>1?"en":""}</span>}
                    <span className="lijst-datum">{FK_DATA.fmtDatum(r.aangemaakt)}</span>
                  </div>
                );
              })
          }
        </div>
      )}

      {sidebar && (
        <DetailSidebar recordId={sidebar} records={records}
          onSluit={()=>setSidebar(null)} onRefresh={onRefresh}
          onToast={onToast} onVerwijder={handleVerwijder} />
      )}
      {confirm && <ConfirmDialog confirm={confirm} onAnnuleer={()=>setConfirm(null)} />}
    </div>
  );
}

function TodayView({ records, onRefresh, onToast, sidebar, setSidebar }) {
  const [confirm, setConfirm] = useState(null);
  const vandaagStart = useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);

  const afspraken = useMemo(() => records
    .filter(r=>{if(!r.volgende_actie)return false;const s=FK_DATA.isOvertijd(r.volgende_actie);return s==="vandaag"||s==="overtijd";})
    .sort((a,b)=>new Date(a.volgende_actie)-new Date(b.volgende_actie)), [records]);

  const openTaken = useMemo(() => records.flatMap(r =>
    (r.taken||[])
      .filter(t=>{if(t.afgerond||!t.vervaldatum)return false;const d=new Date(t.vervaldatum);d.setHours(0,0,0,0);return d<=vandaagStart;})
      .map(t=>({...t,dossierNaam:r.naam,dossierId:r.id}))
  ), [records]);

  const toggleTaak = (dossierId,taakId,huidig) => {
    const r=FK_DATA.updateTask(dossierId,taakId,{afgerond:!huidig});
    if (!r.ok) onToast({type:"fout",bericht:r.error}); else onRefresh();
  };

  const handleVerwijder = (id) => {
    setConfirm({
      titel:"Dossier verwijderen?",bericht:"Dit dossier wordt permanent verwijderd.",bevestigLabel:"Ja, verwijderen",
      onBevestig:()=>{FK_DATA.delete(id);setSidebar(null);onRefresh();onToast({type:"succes",bericht:"Dossier verwijderd."});setConfirm(null);}
    });
  };

  return (
    <div className="today-view">
      <div className="today-inhoud">
        <section className="today-sectie">
          <h2 className="today-sectie-titel">
            📅 Afspraken vandaag
            {afspraken.length>0 && <span className="today-teller">{afspraken.length}</span>}
          </h2>
          {afspraken.length===0
            ? <p className="today-leeg">Geen afspraken vandaag. Goed bezig!</p>
            : afspraken.map(r => (
                <div key={r.id} className={`agenda-item agenda-item-${FK_DATA.isOvertijd(r.volgende_actie)}`}
                  onClick={()=>setSidebar(r.id)}>
                  <div className="agenda-datum">{FK_DATA.fmtDatetime(r.volgende_actie)}</div>
                  <div className="agenda-naam">
                    {r.naam}
                    {FK_DATA.isOvertijd(r.volgende_actie)==="overtijd" && <span className="today-overtijd-tag"> ⚠ Overtijd</span>}
                  </div>
                  <div className="agenda-meta">
                    <StatusBadge status={r.status} />
                    {r.adviseur    && <span className="agenda-prijs">{r.adviseur}</span>}
                    {r.offerteprijs && <span className="agenda-prijs">{r.offerteprijs}</span>}
                  </div>
                </div>
              ))
          }
        </section>
        <section className="today-sectie">
          <h2 className="today-sectie-titel">
            ✅ Open taken
            {openTaken.length>0 && <span className="today-teller today-teller-taken">{openTaken.length}</span>}
          </h2>
          {openTaken.length===0
            ? <p className="today-leeg">Geen openstaande taken. Alles afgewerkt!</p>
            : openTaken.map(t => (
                <div key={t.id} className="today-taak-item">
                  <button className="today-taak-checkbox" onClick={()=>toggleTaak(t.dossierId,t.id,t.afgerond)} title="Markeer als afgerond" />
                  <div className="today-taak-info">
                    <span className="today-taak-titel">{t.titel}</span>
                    <span className="today-taak-dossier" onClick={()=>setSidebar(t.dossierId)}>{t.dossierNaam}</span>
                  </div>
                  {t.vervaldatum && <span className="today-taak-datum">{FK_DATA.fmtDate(t.vervaldatum)}</span>}
                </div>
              ))
          }
        </section>
      </div>
      {sidebar && <DetailSidebar recordId={sidebar} records={records} onSluit={()=>setSidebar(null)} onRefresh={onRefresh} onToast={onToast} onVerwijder={handleVerwijder} />}
      {confirm && <ConfirmDialog confirm={confirm} onAnnuleer={()=>setConfirm(null)} />}
    </div>
  );
}

function AnalyseScreen({ records, walkins, onWalkin, onToast }) {
  const nu        = new Date();
  const maandNaam = nu.toLocaleDateString("nl-BE",{month:"long",year:"numeric"});
  const walkinsDezeMaand  = FK_DATA.walkinsDezeMaand(walkins);
  const dossiersDezeMaand = FK_DATA.dossiersDezeMaand(records);
  const totaalBesteld = records.filter(r=>["Besteld","Geïnstalleerd","Service"].includes(r.status)).length;
  const openTaken     = records.reduce((acc,r)=>acc+(r.taken||[]).filter(t=>!t.afgerond).length,0);
  const handleWalkin = () => { const r=FK_DATA.addWalkin(); if(!r.ok) onToast({type:"fout",bericht:r.error}); else onWalkin(); };
  return (
    <div className="analyse-scherm">
      <section className="analyse-sectie">
        <h2 className="analyse-sectie-titel">Maandstatistiek — {maandNaam}</h2>
        <div className="stat-rij">
          <div className="stat-blok"><div className="stat-getal">{dossiersDezeMaand}</div><div className="stat-label">Nieuwe dossiers deze maand</div></div>
          <div className="stat-blok"><div className="stat-getal">{walkinsDezeMaand}</div><div className="stat-label">Walk-ins deze maand</div></div>
          <div className="stat-blok"><div className="stat-getal">{totaalBesteld}</div><div className="stat-label">Bestellingen (totaal)</div></div>
          <div className="stat-blok"><div className="stat-getal stat-getal-taken">{openTaken}</div><div className="stat-label">Open taken</div></div>
        </div>
      </section>
      <hr className="analyse-divider" />
      <section className="analyse-sectie">
        <h2 className="analyse-sectie-titel">Pipeline overzicht</h2>
        <div className="pipeline-overzicht">
          {STATUSSEN.filter(s=>s!=="Verloren").map(s => {
            const aantal=records.filter(r=>r.status===s).length;
            return (
              <div key={s} className="pipeline-rij">
                <span className="pipeline-status">{s}</span>
                <div className="pipeline-bar-wrapper">
                  <div className="pipeline-bar" style={{width:`${Math.min(100,(aantal/Math.max(records.length,1))*100*3)}%`}} />
                </div>
                <span className="pipeline-aantal">{aantal}</span>
              </div>
            );
          })}

      </section>
      <hr className="analyse-divider" />
      <section className="analyse-sectie">
        <h2 className="analyse-sectie-titel">Walk-in teller</h2>
        <p className="analyse-uitleg">Klik op de knop elke keer iemand binnenstapt in de toonzaal. Anoniem — er wordt geen dossier aangemaakt.</p>
        <button className="btn btn-walkin" onClick={handleWalkin}>+1 Walk-in</button>
        <p className="walkin-totaal">Totaal geregistreerd: <strong>{walkins.length}</strong></p>
      </section>
    </div>
  );
}

function App() {
  const [auth,       setAuth]       = useState(()=>FK_DATA.isAuthenticated());
  const [tab,        setTab]        = useState("kanban");
  const [records,    setRecords]    = useState(()=>FK_DATA.getAll());
  const [walkins,    setWalkins]    = useState(()=>FK_DATA.getWalkins());
  const [sidebar,    setSidebar]    = useState(null);
  const [toast,      setToast]      = useState(null);
  const [nieuwModal, setNieuwModal] = useState(false);
  const [importData, setImportData] = useState(null);
  const [searchOpen, setSearchOpen] = useState(false);

  const refresh   = useCallback(()=>{setRecords(FK_DATA.getAll());setWalkins(FK_DATA.getWalkins());},[]);
  const showToast = useCallback((t)=>setToast(t),[]);

  useEffect(()=>{
    const onKey=(e)=>{if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();setSearchOpen(true);}};
    document.addEventListener("keydown",onKey);
    return ()=>document.removeEventListener("keydown",onKey);
  },[]);

  const openDossier = useCallback((id)=>{setTab("kanban");setSidebar(id);},[]);

  const handleLogin    = ()=>setAuth(true);
  const handleLogout   = ()=>{FK_DATA.logout();setAuth(false);};
  const handleTabChange = (t)=>{setTab(t);setSidebar(null);};

  const handleExport = ()=>{
    const r=FK_DATA.exportExcel(records);
    if (!r.ok) showToast({type:"fout",bericht:r.error}); else showToast({type:"succes",bericht:"Excel gedownload."});
  };

  const handleImport = (e)=>{
    const file=e.target.files[0]; if(!file) return; e.target.value="";
    FK_DATA.importExcel(file).then(data=>setImportData(data)).catch(err=>showToast({type:"fout",bericht:err}));
  };

  const bevestigImport = ()=>{
    if(!importData) return;
    const r=FK_DATA.saveSafe("fransen_crm_data",importData.records);
    if (!r.ok) showToast({type:"fout",bericht:r.error});
    else { refresh(); showToast({type:"succes",bericht:`${importData.aantal} dossiers geïmporteerd.`}); }
    setImportData(null);
  };

  if (!auth) return <LoginScreen onLogin={handleLogin} />;

  return (
    <div className="app">
      <Nav tab={tab} onTabChange={handleTabChange} onNieuw={()=>setNieuwModal(true)}
        onExport={handleExport} onImport={handleImport} onLogout={handleLogout} onSearch={()=>setSearchOpen(true)} />

      {tab==="kanban"  && <KanbanScreen  records={records} onRefresh={refresh} onToast={showToast} sidebar={sidebar} setSidebar={setSidebar} />}
      {tab==="vandaag" && <TodayView     records={records} onRefresh={refresh} onToast={showToast} sidebar={sidebar} setSidebar={setSidebar} />}
      {tab==="analyse" && <AnalyseScreen records={records} walkins={walkins} onWalkin={refresh} onToast={showToast} />}

      {nieuwModal && (
        <NieuwDossierModal
          onSluit={()=>setNieuwModal(false)}
          onOpslaan={(id)=>{setNieuwModal(false);refresh();setTab("kanban");setSidebar(id);showToast({type:"succes",bericht:"Nieuw dossier aangemaakt."});}}
          onOpenBestaand={openDossier} onToast={showToast} />
      )}
      {importData && <ImportBevestigingModal data={importData} onBevestig={bevestigImport} onAnnuleer={()=>setImportData(null)} />}
      {searchOpen && <GlobalSearch onSluit={()=>setSearchOpen(false)} onOpenDossier={openDossier} />}
      <Toast toast={toast} onDismiss={()=>setToast(null)} />
    </div>
  );
}

const rootEl    = document.getElementById("root");
const reactRoot = ReactDOM.createRoot(rootEl);
reactRoot.render(<App />);

const loadingEl = document.getElementById("loading");
if (loadingEl) loadingEl.style.display = "none";
  </script>
</body>
</html>
